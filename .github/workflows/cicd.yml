name: CI-CD Workshop

on:
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  cd:
    needs: ci
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create SSH key files
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/awsacademy
          chmod 600 ~/.ssh/awsacademy
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/awsacademy.pub

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Import key pair if it already exists
        working-directory: terraform
        run: |
          terraform import aws_key_pair.academy_key academy-key || echo "Key pair not yet created"

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Get EC2 IP
        id: tf-output
        working-directory: terraform
        run: echo "ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: Disable host key checking
        run: echo "ANSIBLE_HOST_KEY_CHECKING=False" >> $GITHUB_ENV

      - name: Create Ansible inventory
        working-directory: ansible
        run: |
          echo "[web]" > inventory
          echo "${{ steps.tf-output.outputs.ip }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/awsacademy" >> inventory

      - name: Run Ansible playbook
        working-directory: ansible
        run: ansible-playbook -i inventory playbook.yml
